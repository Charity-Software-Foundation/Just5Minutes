name: Package Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package src/ as zip
        run: |
          cd src
          zip -r ../just-5-minutes.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: just-5-minutes
          path: just-5-minutes.zip
